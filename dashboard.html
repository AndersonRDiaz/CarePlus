<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Care Plus - Dashboard</title>
    <link rel="icon" type="image/png" href="img/logo-carePlus.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style-dash.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4" style="background-color: #002d5c;">
    <div class="container-fluid">
        <div class="row justify-content-center w-100">
            <div class="col-lg-10 d-flex justify-content-between align-items-center">
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">📋 Nova Triagem</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="dashboard.html">📊 Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="historico.html">📂 Histórico</a>
                        </li>
                        <li class="nav-item ms-lg-3">
                            <a class="btn btn-outline-light btn-sm mt-1" href="#">Logout</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-md-11 col-12">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-dark fw-bold">Gestão de Triagem</h2>
                <div class="btn-group">
                    <button class="btn btn-outline-primary" onclick="window.location.reload()">🔄 Atualizar</button>
                    <a href="index.html" class="btn btn-success">＋ Novo Paciente</a>
                </div>
            </div>

            <div class="row g-5 mb-4 text-center">
                <div class="col-md-4">
                    <div class="card stat-card border-start border-danger border-2">
                        <div class="card-body">
                            <h6 class="text-muted">Críticos</h6>
                            <h3 id="countCritico">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card border-start border-primary border-2">
                        <div class="card-body">
                            <h6 class="text-muted">Total de Hoje</h6>
                            <h3 id="countTotal">--</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card border-start border-success border-2">
                        <div class="card-body">
                            <h6 class="text-muted">Média Estável</h6>
                            <h3 id="avgSaude">--</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-5 mb-4">
                <div class="col-md-8">
                    <div class="card p-3 h-60 shadow-sm">
                        <h6 class="fw-bold mb-3">Fluxo de Atendimento</h6>
                        <canvas id="chartTendencia"></canvas>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 h-100 shadow-sm">
                        <h6 class="fw-bold mb-3">Severidade (IA)</h6>
                        <canvas id="chartRiscos"></canvas>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mb-5">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0">Fila de Pacientes</h5>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Paciente</th>
                                <th>Idade</th>
                                <th>Nível de Dor</th>
                                <th>Análise Preditiva (IA)</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaPacientes">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</main>

<script src="./js/script-dash.js"></script>
</body>
</html>
